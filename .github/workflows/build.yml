name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 libopengl0
          python -m pip install --upgrade pip
          pip install pyqt5 pyinstaller
          pip install -r requirements.txt

      - name: Build
        run: python scripts/build.py

      - name: Rename
        run: |
          mv dist/Kyronext-Studio dist/Kyronext-Studio-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kyronext-linux-x86_64
          path: dist/Kyronext-Studio-linux-x86_64

  release:
    needs: [build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
